<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
            // 콘솔(개발자 창)에 출력하기
            console.log("안녕");
            console.log("하경미");
            // 변수 - 데이터를 저장하는 박스 (재사용하기위해서)
            // let - 변수 값을 재 할당할수 있다.
            let name = "하경미";
            console.log(name);
            name = "김철수";
            console.log(name);
            const name1 = "김영희";
            console.log(name1);
            // name1 = "그린이" //const - 값을 재할당 할수 없다.
        </script>
    </body>
</html>
