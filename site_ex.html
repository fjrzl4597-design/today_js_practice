<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>이지연</title>
        <link rel="stylesheet" href="css/site_ex.css" />
        <script src="js/site_ex.js" defer></script>
    </head>
    <body>
        <h1>js 다양한 예제</h1>
        <!-- 예제 1 -->
        <section>
            <h2>1. 글자 변경</h2>
            <h3 class="title">안녕하세요.</h3>
            <button class="text-btn">변경하기</button>
        </section>
        <!-- 예제 2 -->
        <section>
            <h2>2. 박스 애니메이션</h2>
            <button class="move-btn">움직이기</button>
            <div class="box"></div>
        </section>
        <!-- 예제 연습 2-1
        <section>
            <h2>2-1. 박스 애니메이션</h2>
            <button class="change-btn">움직이기</button>
            <div class="square"></div>
        </section> -->
        <!-- 다크모드 -->
        <section>
            <h2>3. 다크모드</h2>
            <button class="dark-btn">다크모드</button>
        </section>
        <!-- 예제 4 -->
        <section>
            <h2>4. 메뉴 열기</h2>
            <button class="menu-btn">메뉴 열기</button>
            <div class="menu">메뉴</div>
        </section>
        <!-- 예제 5 -->
        <section>
            <h2>모달창</h2>
            <button class="modal-open">모달창 열기</button>
            <!-- 모달창 -->
            <div class="modal">
                <h3>모달창입니다.</h3>
                <button class="modal-close">X닫기</button>
            </div>
        </section>
        <!-- 예제 6 -->
        <section>
            <h2>팝업창</h2>
            <button class="popup-open">팝업창 열기</button>
            <!-- 팝업창 -->
            <div class="popup">
                <h3>첫눈에 반한 혜택! 첫 구매 고객을 위한 특별 선물 🎁</h3>
                <button class="popup-close">X 닫기</button>
            </div>
        </section>
    </body>
</html>
