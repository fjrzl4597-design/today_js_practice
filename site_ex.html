<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="css/site_ex.css" />
        <script src="js/site_ex.js" defer></script>
    </head>
    <body>
        <h1>js 다양한 예제</h1>
        <!-- 예제 1 -->
        <section>
            <h2>1. 글자 변경</h2>
            <h3 class="title">안녕하세요.</h3>
            <button class="text-btn">변경하기</button>
        </section>
        <!-- 예제 2 -->
        <section>
            <h2>2. 박스 애니메이션</h2>
            <button class="move-btn">움직이기</button>
            <div class="box"></div>
        </section>
        <!-- 예제 연습 2-1 -->
        <!-- 다크모드 -->
        <section>
            <h2>3. 다크모드</h2>
            <button class="dark-btn">다크모드</button>
        </section>
        <!-- 예제 4 -->
        <section>
            <h2>4. 메뉴 열기</h2>
            <button class="menu-btn">메뉴 열기</button>
            <div class="menu">메뉴</div>
        </section>
        <!-- 예제 5 -->
        <section>
            <h2>모달창</h2>
            <button class="modal-open">모달창 열기</button>
            <!-- 모달창 -->
            <div class="modal">
                <h3>모달창입니다.</h3>
                <button class="modal-close">X닫기</button>
            </div>
        </section>
        <!-- 예제 6 -->
        <section>
            <h2>6. 탭메뉴</h2>
            <div class="tabs">
                <button class="tab-btn">HTML</button>
                <button class="tab-btn">CSS</button>
                <button class="tab-btn">JS</button>
            </div>
            <div class="content content_show">HTML 내용</div>
            <div class="content">CSS 내용</div>
            <div class="content">JS 내용</div>
        </section>
        <!-- 예제 7 -->
        <section>
            <h2>7. 이미지 변경</h2>
            <img src="https://picsum.photos/300/200?1" class="big" />
            <div class="gallery">
                <img src="https://picsum.photos/300/200?1" />

                <img src="https://picsum.photos/300/200?2" />

                <img src="https://picsum.photos/300/200?3" />
            </div>
        </section>
    </body>
</html>
