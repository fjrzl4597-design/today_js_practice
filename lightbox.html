<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="css/lightbox.css" />
        <script src="js/lightbox.js"></script>
    </head>
    <body>
        <div class="gallery">
            <img
                src="https://picsum.photos/id/1015/400/300"
                alt="이미지"
                class="pic"
                data-src="https://picsum.photos/id/1015/400/300"
                data-title="첫번째 이미지"
                data-desc="첫번째 이미지 설명"
            />
            <img
                src="https://picsum.photos/id/1025/400/300"
                alt="이미지"
                class="pic"
                data-src="https://picsum.photos/id/1025/400/300"
                data-title="두번째 이미지"
                data-desc="두번째 이미지 설명"
            />
            <img
                src="https://picsum.photos/id/1035/400/300"
                alt="이미지"
                class="pic"
                data-src="https://picsum.photos/id/1035/400/300"
                data-title="세번째 이미지"
                data-desc="세번째 이미지 설명"
            />
        </div>
        <div id="lightBox">
            <h2 id="lightBox-title">
                <!-- js출력 -->
            </h2>
            <p id="lightBox-desc">
                <!-- js출력 -->
            </p>
            <img id="lightBox-img" />
        </div>
    </body>
</html>
